<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GOOMBA Lookup</title>
<style>
  :root{--bg:#161009;--bg2:#1f160d;--panel:#2a1d10;--line:#4a3318;--gold:#f0a82e;--gold-soft:#d8902a;--tan:#c98a3b;--cream:#f6ecd9;--muted:#b39873;--red:#d4452f;--ok:#7fd07f;--bad:#ff7a6b;--warn:#f0c14b;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--cream);min-height:100vh;background:radial-gradient(1200px 520px at 50% -140px,#3a2812 0%,var(--bg) 60%);}
  header{display:flex;align-items:center;gap:14px;padding:16px 22px;background:linear-gradient(180deg,#3a2812,#241910);border-bottom:4px solid var(--gold);box-shadow:0 6px 22px rgba(0,0,0,.45);}
  header h1{margin:0;font-size:20px;font-weight:900;letter-spacing:2px;color:var(--gold);text-shadow:2px 2px 0 #1a1209;}
  header .sub{font-size:10px;letter-spacing:3px;color:var(--tan);font-weight:700;}
  main{max-width:760px;margin:0 auto;padding:26px 22px 90px;}
  .hero{text-align:center;margin:10px 0 20px;}
  .hero h2{font-size:30px;font-weight:900;letter-spacing:1px;margin:0;color:var(--cream);text-shadow:2px 2px 0 #1a1209;}
  .hero p{color:var(--muted);font-size:13px;margin:8px 0 0;letter-spacing:.5px;}
  .card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px;box-shadow:0 4px 16px rgba(0,0,0,.35);}
  .bigsearch{display:flex;gap:10px;flex-wrap:wrap;}
  .bigsearch input{flex:1;min-width:220px;padding:15px 16px;border:1px solid var(--line);border-radius:11px;font-size:17px;background:#140d07;color:var(--cream);}
  .bigsearch input::placeholder{color:#6f5a3c;}
  .bigsearch button{background:var(--gold);color:#241910;border:none;border-radius:11px;padding:0 28px;font-size:16px;font-weight:900;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
  .bigsearch button:hover{background:var(--gold-soft);}
  .bigsearch button:disabled{background:#5a4a33;color:#2a1d10;cursor:not-allowed;}
  .examples{color:var(--muted);font-size:12px;margin-top:12px;line-height:1.7;}
  .examples code{background:#140d07;border:1px solid var(--line);border-radius:5px;padding:2px 7px;color:var(--gold);}
  .muted{color:var(--muted);font-size:12px;}
  .pill{display:inline-block;padding:4px 11px;border-radius:999px;font-size:11px;font-weight:800;}
  .pill.score{background:rgba(240,168,46,.15);color:var(--gold);border:1px solid rgba(240,168,46,.4);}
  .pill.dead{background:rgba(212,69,47,.18);color:var(--bad);border:1px solid rgba(212,69,47,.5);}
  .result-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .result-head .nm{font-size:22px;font-weight:900;color:var(--cream);}
  .ownerlabel{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--tan);margin-bottom:6px;}
  .readout{display:grid;grid-template-columns:130px 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .readout .k{background:#1c130a;padding:11px 13px;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--tan);display:flex;align-items:center;}
  .readout .v{background:#241910;padding:11px 13px;font-size:15px;color:var(--cream);display:flex;align-items:center;flex-wrap:wrap;word-break:break-word;}
  .readout a{color:var(--gold);text-decoration:none;font-weight:700;}
  .readout a:hover{text-decoration:underline;}
  .readout .empty{color:#6f5a3c;}
  .typetag{font-size:11px;color:var(--muted);margin-left:8px;}
  .phonechip{display:inline-flex;align-items:center;margin:2px 10px 2px 0;}
  .section-label{font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin:22px 0 12px;display:flex;align-items:center;gap:10px;}
  .section-label::after{content:"";flex:1;height:1px;background:var(--line);}
  details{margin-top:12px;border:1px solid var(--line);border-radius:9px;background:rgba(201,138,59,.05);}
  details summary{cursor:pointer;padding:10px 13px;font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--tan);list-style:none;}
  details summary::-webkit-details-marker{display:none;}
  details summary::before{content:"\25B8 ";color:var(--gold);}
  details[open] summary::before{content:"\25BE ";}
  details .addr{padding:6px 13px;font-size:13px;color:var(--cream);border-top:1px solid var(--line);}
  .relcard{border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:rgba(201,138,59,.05);}
  .relcard .relnm{font-size:16px;font-weight:800;}
  .store{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:rgba(240,168,46,.05);}
  .store .pin{font-size:20px;}
  .store .meta{flex:1;}
  .store .meta .snm{font-weight:800;color:var(--cream);}
  .store .meta .saddr{font-size:13px;color:var(--muted);margin:2px 0;}
  .store .meta a{color:var(--gold);text-decoration:none;font-weight:700;font-size:14px;}
  .store .meta a:hover{text-decoration:underline;}
  .store .dist{font-weight:900;color:var(--gold);white-space:nowrap;}
  .openpill{font-size:11px;font-weight:800;padding:2px 7px;border-radius:999px;margin-left:6px;}
  .openpill.yes{background:rgba(127,208,127,.15);color:var(--ok);}
  .openpill.no{background:rgba(255,122,107,.12);color:var(--bad);}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .statusmsg{text-align:center;padding:26px;font-size:15px;color:var(--muted);}
  .flag{background:rgba(240,193,75,.08);border:1px solid rgba(240,193,75,.35);border-radius:8px;padding:11px 13px;font-size:12px;color:var(--warn);}
  .goomba-field{position:fixed;left:0;right:0;bottom:0;height:64px;pointer-events:none;overflow:hidden;z-index:4;}
  .walker{position:absolute;bottom:4px;will-change:transform;}
  .walker .body{display:inline-block;transform-origin:50% 92%;animation:waddle .38s ease-in-out infinite;}
  .w1{animation:marchR 15s linear infinite;}.w2{animation:marchL 19s linear infinite;animation-delay:-5s;}
  .w3{animation:marchR 11s linear infinite;animation-delay:-8s;}.w4{animation:marchL 24s linear infinite;animation-delay:-14s;}
  @keyframes marchR{from{transform:translateX(-90px);}to{transform:translateX(calc(100vw + 90px));}}
  @keyframes marchL{from{transform:translateX(calc(100vw + 90px)) scaleX(-1);}to{transform:translateX(-90px) scaleX(-1);}}
  @keyframes waddle{0%,100%{transform:translateY(0) rotate(-6deg);}50%{transform:translateY(-3px) rotate(6deg);}}
</style>
</head>
<body>
<header>
  <svg width="40" height="40" viewBox="0 0 64 64" aria-hidden="true">
    <ellipse cx="32" cy="54" rx="20" ry="7" fill="#1a1209"/><path d="M14 30c0-13 8-22 18-22s18 9 18 22c0 9-8 14-18 14s-18-5-18-14z" fill="#8a5a2b"/>
    <path d="M16 31c0-11 7-19 16-19s16 8 16 19" fill="#a06a32"/><ellipse cx="24" cy="34" rx="6" ry="7" fill="#fff"/><ellipse cx="40" cy="34" rx="6" ry="7" fill="#fff"/>
    <circle cx="26" cy="36" r="2.6" fill="#d4452f"/><circle cx="38" cy="36" r="2.6" fill="#d4452f"/><path d="M17 27l11 4M47 27l-11 4" stroke="#1a1209" stroke-width="3" stroke-linecap="round"/><path d="M22 46h20l-3 5H25z" fill="#f6ecd9"/>
  </svg>
  <div><h1>GOOMBA LOOKUP</h1><div class="sub">ONE BOX &middot; FULL WORKUP</div></div>
</header>
<main>
  <div class="hero">
    <h2>WHO ARE YOU LOOKING FOR</h2>
    <p>Type a name with a city and state, or a phone number. Hit enter.</p>
  </div>

  <div class="card">
    <div class="bigsearch">
      <input id="q" type="text" placeholder="wayne nettnay, north attleboro, ma" autocomplete="off" autofocus />
      <button id="searchBtn" type="button">Search</button>
    </div>
    <div class="examples">
      Name: <code>wayne nettnay, north attleboro, ma</code> &nbsp; or just <code>wayne nettnay fl</code><br/>
      Reverse phone: <code>561-536-7687</code>
    </div>
  </div>

  <div id="results"></div>
</main>

<div class="goomba-field" aria-hidden="true">
  <div class="walker w1"><span class="body"><svg width="42" height="42" viewBox="0 0 64 64"><ellipse cx="32" cy="58" rx="17" ry="4" fill="rgba(0,0,0,.35)"/><path d="M14 30c0-13 8-22 18-22s18 9 18 22c0 9-8 14-18 14s-18-5-18-14z" fill="#8a5a2b"/><path d="M16 31c0-11 7-19 16-19s16 8 16 19" fill="#a06a32"/><ellipse cx="24" cy="34" rx="6" ry="7" fill="#fff"/><ellipse cx="40" cy="34" rx="6" ry="7" fill="#fff"/><circle cx="26" cy="36" r="2.8" fill="#d4452f"/><circle cx="38" cy="36" r="2.8" fill="#d4452f"/><path d="M17 26l12 5M47 26l-12 5" stroke="#1a1209" stroke-width="3.6" stroke-linecap="round"/><path d="M24 45h16l-2.5 4.5H26.5z" fill="#f6ecd9"/><ellipse cx="24" cy="55" rx="6" ry="3" fill="#5a3a18"/><ellipse cx="40" cy="55" rx="6" ry="3" fill="#5a3a18"/></svg></span></div>
  <div class="walker w2"><span class="body"><svg width="34" height="34" viewBox="0 0 64 64"><ellipse cx="32" cy="58" rx="17" ry="4" fill="rgba(0,0,0,.35)"/><path d="M14 30c0-13 8-22 18-22s18 9 18 22c0 9-8 14-18 14s-18-5-18-14z" fill="#7a4f26"/><path d="M16 31c0-11 7-19 16-19s16 8 16 19" fill="#925f2d"/><ellipse cx="24" cy="34" rx="6" ry="7" fill="#fff"/><ellipse cx="40" cy="34" rx="6" ry="7" fill="#fff"/><circle cx="26" cy="36" r="2.8" fill="#ff5a3c"/><circle cx="38" cy="36" r="2.8" fill="#ff5a3c"/><path d="M17 26l12 5M47 26l-12 5" stroke="#1a1209" stroke-width="3.6" stroke-linecap="round"/><path d="M24 45h16l-2.5 4.5H26.5z" fill="#f6ecd9"/><ellipse cx="24" cy="55" rx="6" ry="3" fill="#4f3215"/><ellipse cx="40" cy="55" rx="6" ry="3" fill="#4f3215"/></svg></span></div>
  <div class="walker w3"><span class="body"><svg width="46" height="46" viewBox="0 0 64 64"><ellipse cx="32" cy="58" rx="17" ry="4" fill="rgba(0,0,0,.35)"/><path d="M14 30c0-13 8-22 18-22s18 9 18 22c0 9-8 14-18 14s-18-5-18-14z" fill="#8a5a2b"/><path d="M16 31c0-11 7-19 16-19s16 8 16 19" fill="#a06a32"/><ellipse cx="24" cy="34" rx="6.5" ry="7.5" fill="#fff"/><ellipse cx="40" cy="34" rx="6.5" ry="7.5" fill="#fff"/><circle cx="26" cy="36" r="3" fill="#d4452f"/><circle cx="38" cy="36" r="3" fill="#d4452f"/><path d="M16 25l13 6M48 25l-13 6" stroke="#1a1209" stroke-width="4" stroke-linecap="round"/><path d="M23 45h18l-3 5H26z" fill="#f6ecd9"/><ellipse cx="24" cy="55" rx="6" ry="3" fill="#5a3a18"/><ellipse cx="40" cy="55" rx="6" ry="3" fill="#5a3a18"/></svg></span></div>
  <div class="walker w4"><span class="body"><svg width="30" height="30" viewBox="0 0 64 64"><ellipse cx="32" cy="58" rx="17" ry="4" fill="rgba(0,0,0,.35)"/><path d="M14 30c0-13 8-22 18-22s18 9 18 22c0 9-8 14-18 14s-18-5-18-14z" fill="#6f4722"/><path d="M16 31c0-11 7-19 16-19s16 8 16 19" fill="#875829"/><ellipse cx="24" cy="34" rx="6" ry="7" fill="#fff"/><ellipse cx="40" cy="34" rx="6" ry="7" fill="#fff"/><circle cx="26" cy="36" r="2.8" fill="#ff5a3c"/><circle cx="38" cy="36" r="2.8" fill="#ff5a3c"/><path d="M17 26l12 5M47 26l-12 5" stroke="#1a1209" stroke-width="3.6" stroke-linecap="round"/><path d="M24 45h16l-2.5 4.5H26.5z" fill="#f6ecd9"/><ellipse cx="24" cy="55" rx="6" ry="3" fill="#46300f"/><ellipse cx="40" cy="55" rx="6" ry="3" fill="#46300f"/></svg></span></div>
</div>

<script>
const STATES={al:"AL",alaska:"AK",ak:"AK",arizona:"AZ",az:"AZ",arkansas:"AR",ar:"AR",california:"CA",ca:"CA",colorado:"CO",co:"CO",connecticut:"CT",ct:"CT",delaware:"DE",de:"DE",florida:"FL",fl:"FL",georgia:"GA",ga:"GA",hawaii:"HI",hi:"HI",idaho:"ID",id:"ID",illinois:"IL",il:"IL",indiana:"IN",in:"IN",iowa:"IA",ia:"IA",kansas:"KS",ks:"KS",kentucky:"KY",ky:"KY",louisiana:"LA",la:"LA",maine:"ME",me:"ME",maryland:"MD",md:"MD",massachusetts:"MA",mass:"MA",ma:"MA",michigan:"MI",mi:"MI",minnesota:"MN",mn:"MN",mississippi:"MS",ms:"MS",missouri:"MO",mo:"MO",montana:"MT",mt:"MT",nebraska:"NE",ne:"NE",nevada:"NV",nv:"NV",nh:"NH",nj:"NJ",nm:"NM",ny:"NY",newyork:"NY",nc:"NC",nd:"ND",ohio:"OH",oh:"OH",oklahoma:"OK",ok:"OK",oregon:"OR",or:"OR",pennsylvania:"PA",pa:"PA",ri:"RI",sc:"SC",sd:"SD",tennessee:"TN",tn:"TN",texas:"TX",tx:"TX",utah:"UT",ut:"UT",vermont:"VT",vt:"VT",virginia:"VA",va:"VA",washington:"WA",wa:"WA",wv:"WV",wisconsin:"WI",wi:"WI",wyoming:"WY",wy:"WY",alabama:"AL"};
const TWO_WORD={"new hampshire":"NH","new jersey":"NJ","new mexico":"NM","new york":"NY","north carolina":"NC","north dakota":"ND","rhode island":"RI","south carolina":"SC","south dakota":"SD","west virginia":"WV"};
function normState(s){if(!s)return"";const k=s.toLowerCase().replace(/\./g,"").trim();return TWO_WORD[k]||STATES[k.replace(/\s+/g,"")]||STATES[k]||"";}

function parseInput(raw){
  raw=(raw||"").trim();
  const digits=raw.replace(/\D/g,"");
  if(!/[a-zA-Z]/.test(raw) && digits.length>=10){return {phone:digits};}
  let name="",city="",state="";
  if(raw.includes(",")){
    const parts=raw.split(",").map(s=>s.trim()).filter(Boolean);
    if(parts.length>=3){name=parts[0];city=parts[1];state=normState(parts[2])||parts[2];}
    else if(parts.length===2){name=parts[0];const sub=parts[1].split(/\s+/);const st=normState(sub[sub.length-1]);if(st){state=st;city=sub.slice(0,-1).join(" ");}else{city=parts[1];}}
    else{name=parts[0];}
  } else {
    const toks=raw.split(/\s+/).filter(Boolean);
    const lastTwo=normState(toks.slice(-2).join(" "));
    if(lastTwo){state=lastTwo;toks.splice(-2,2);}
    else{const last=normState(toks[toks.length-1]);if(last){state=last;toks.pop();}}
    if(toks.length>=3){name=toks.slice(0,2).join(" ");city=toks.slice(2).join(" ");}
    else{name=toks.join(" ");}
  }
  return {name,city,state};
}

function fmtPhone(n){const d=String(n||"").replace(/\D/g,"");if(d.length===11&&d[0]==="1")return"("+d.slice(1,4)+") "+d.slice(4,7)+"-"+d.slice(7);if(d.length===10)return"("+d.slice(0,3)+") "+d.slice(3,6)+"-"+d.slice(6);return n||"";}
function tel(n){const d=String(n||"").replace(/\D/g,"");return d?'<a href="tel:'+d+'">'+fmtPhone(n)+"</a>":'<span class="empty">none</span>';}
function mail(e){return e?'<a href="mailto:'+e+'">'+e+"</a>":'<span class="empty">none</span>';}

const MSG={no_input:"Type a name with a place, or a phone number.",no_match:"No record matched. Try just the name and state, or check the spelling.",invalid_key:"The Whitepages key was rejected on the server.",bad_request:"The search was rejected as malformed.",rate_limited:"Rate limited by Whitepages. Wait a moment and try again.",server_error:"Whitepages had a server error. Try again shortly.",network_error:"Could not reach Whitepages. Try again.",error:"Something went wrong."};
const WMSG={no_address:"No address on the record, so no store search ran.",maps_not_configured:"Google Maps key not set on the server.",maps_key_denied:"Google rejected the Maps key. Enable Geocoding and Places on it.",geocode_failed:"Could not map the address.",none_found:"No Walgreens found nearby.",error:"Store lookup error."};

const q=document.getElementById("q"),btn=document.getElementById("searchBtn"),results=document.getElementById("results");
btn.onclick=run; q.addEventListener("keydown",e=>{if(e.key==="Enter")run();});

async function run(){
  const raw=q.value.trim(); if(!raw)return;
  const parsed=parseInput(raw);
  const body=Object.assign({include_historical:true,trace_relatives:true,find_walgreens:true,radius:25},parsed);
  btn.disabled=true;const old=btn.textContent;btn.textContent="...";
  results.innerHTML='<div class="card"><div class="statusmsg"><span class="spinner"></span> &nbsp; Pulling the full workup...</div></div>';
  try{
    const r=await fetch("/api/search",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(x=>x.json());
    if(r.error){results.innerHTML='<div class="card"><div class="statusmsg">'+r.error+"</div></div>";return;}
    if(r.status!=="matched"){results.innerHTML='<div class="card"><div class="statusmsg">'+(MSG[r.status]||"No result.")+"</div></div>";return;}
    render(r);
  }catch(e){results.innerHTML='<div class="card"><div class="statusmsg">Request failed. Try again.</div></div>';}
  finally{btn.disabled=false;btn.textContent=old;}
}

function render(r){
  const p=r.person;
  let h='<div class="card">';
  if(r.mode==="phone")h+='<div class="ownerlabel">Owner of '+fmtPhone(r.queried_phone)+'</div>';
  if(r.widened)h+='<div class="flag" style="margin-bottom:14px">No exact match in that city, so this is the closest name match in the state. Check the address.</div>';
  h+='<div class="result-head"><span class="nm">'+(p.name||"Unknown")+"</span>";
  if(p.score!=null)h+='<span class="pill score">match '+p.score+"</span>";
  if(p.is_dead)h+='<span class="pill dead">deceased</span>';
  if(p.dob)h+='<span class="muted">DOB '+p.dob+"</span>";
  h+="</div>";

  // phones
  let phonesHtml="";
  if(p.phones&&p.phones.length){
    phonesHtml=p.phones.map(ph=>'<span class="phonechip">'+tel(ph.number)+(ph.type?'<span class="typetag">'+ph.type+(ph.score!=null?" &middot; "+ph.score:"")+"</span>":"")+"</span>").join("");
  } else { phonesHtml='<span class="empty">none</span>'; }

  h+='<div class="readout">'
    +'<div class="k">Phones</div><div class="v">'+phonesHtml+"</div>"
    +'<div class="k">Email</div><div class="v">'+mail(p.email)+"</div>"
    +'<div class="k">Address</div><div class="v">'+(p.best_address||'<span class="empty">none</span>')+"</div>"
    +"</div>";

  if(p.addresses&&p.addresses.length>1){
    h+='<details><summary>All addresses on file ('+p.addresses.length+')</summary>';
    p.addresses.forEach(a=>{h+='<div class="addr">'+a+"</div>";});
    h+='</details>';
  }

  const nk=r.nok;
  if(nk){
    h+='<div class="section-label">Next of kin</div>';
    if(nk.found){
      h+='<div class="relcard"><span class="relnm">'+(nk.name||"Relative")+'</span> &nbsp; '+tel(nk.phone)+(nk.type?'<span class="typetag">'+nk.type+"</span>":"")+"</div>";
    } else {
      h+='<div class="muted">No next of kin with a phone found'+(nk.tried?" (checked "+nk.tried+")":"")+".</div>";
    }
  }

  const wg=r.walgreens;
  if(wg){
    h+='<div class="section-label">Nearest Walgreens &middot; FedEx OnSite</div>';
    if(wg.status==="ok"&&wg.stores&&wg.stores.length){
      wg.stores.forEach(s=>{
        let open="";if(s.open_now===true)open='<span class="openpill yes">open now</span>';else if(s.open_now===false)open='<span class="openpill no">closed</span>';
        h+='<div class="store"><div class="pin">&#128205;</div><div class="meta">'
          +'<div class="snm">'+s.name+open+"</div>"
          +'<div class="saddr">'+(s.address||"")+"</div>"
          +(s.phone?tel(s.phone):'<span class="empty">no phone listed</span>')
          +"</div><div class=\"dist\">"+(s.distance_mi!=null?s.distance_mi+" mi":"")+"</div></div>";
      });
      h+='<div class="muted" style="margin-top:4px">Confirm FedEx OnSite before sending. Not every Walgreens carries it.</div>';
    } else {
      h+='<div class="muted">'+(WMSG[wg.status]||"No Walgreens found nearby.")+"</div>";
    }
  }

  h+="</div>";
  results.innerHTML=h;
}
</script>
</body>
</html>
